<!DOCTYPE html>
<html>
<!-- Metadata for the page -->
<head>
    <title>Student Dashboard</title>
    <script defer src="stud_dash_script.js"></script>
    <link rel="stylesheet" href="stud_dash_style.css">
</head>

<!-- Main contents of the page -->
<body>
<!-- Header banner -->
<header>
    <p id="header_welc_text">Welcome, student</p> <!-- Placeholder welcome text -->
    <p id="header_xp_text" class="head_right_align">0XP</p>  <!-- Placeholder XP text-->
    <img id="logo_img" src="/Frontend/login/login_assets/KES_logo_transparent.png" alt="The KES academy logo" height="50px">
</header>

<!-- Rest of the page -->
<main>
<!-- Div for items on the left of the page -->
<div id="lhs_div">
    <!-- Tasks tab -->
    <div id="tasks_tab">
        <div id="tt_stats_boxes">
            <h3>Your starting points:</h3>
            <p id="tt_active" class="tt_stat"><br>Active Tasks</p> <!-- Placeholder for active tasks -->
            <p id="tt_overdue" class="tt_stat"><br>Overdue Tasks</p> <!-- Placeholder for overdue tasks-->
        </div>
        <p>Each task is a button. Press it to complete the task!</p>
        <div id="tt_tasks_container">Tasks will appear here once set</div> <!-- Placeholder for tasks -->
    </div>
</div>

<!-- Div for items on the right of the page -->
<div id="rhs_div">
    <!-- Student data tab -->
    <div id="stud_tab">
        <!-- Div for left hand side (lhs) content -->
        <div id="st_lhs_content">
            <h3>Your data:</h3>
            <div id="st_stats_boxes">
            <p id="life_avg" class="st_stat"><br>Lifetime Average</p>
            <p id="recent_avg" class="st_stat"><br>Recent Average</p>
            </div>
        </div>
        <!-- Div for right hand side (rhs) content -->
        <div id="st_rhs_content">
            <p id="insight">Insight<br>placehold</p> <!-- Placeholder for comment on data -->
        </div>
    </div>

    <!-- Next steps tab -->
    <div id="next_tab">
        <h3>Next steps:</h3>
        <!-- Buttons linking to other pages -->
        <button id="ind_study_butt">Independant Study</button><br>
        <button id="lead_butt">Leaderboards</button><br>
        <button id="history_butt">Task History</button>
    </div>
</div>
</main>
</body>
</html>
